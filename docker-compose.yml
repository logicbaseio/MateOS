services:
  postgres:
    image: postgres:16-alpine
    container_name: mateos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mateos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mateos"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - mateos-postgres-data:/var/lib/postgresql/data

volumes:
  mateos-postgres-data:
